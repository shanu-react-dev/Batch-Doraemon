<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar in HTML</title>

    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      nav {
        height: 70px;
        width: 100%;
        display: flex;
        justify-content: space-around;
        background-color: yellow;
      }

      .firstBox {
        height: 100%;
        width: 30%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: lightseagreen;
      }

      .secondBox {
        height: 100%;
        width: 30%;
        background-color: lightsteelblue;
      }
      ul {
        height: 100%;
        display: flex;
        list-style: none;
        /* justify-content: space-around; */
        /* justify-content: space-between; */
        justify-content: space-evenly;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="firstBox">
        <h1>Amarjeet.</h1>
      </div>
      <div class="secondBox">
        <ul>
          <li>Home</li>
          <li>About</li>
          <li>Portfolio</li>
        </ul>
      </div>
    </nav>
  </body>
</html>
