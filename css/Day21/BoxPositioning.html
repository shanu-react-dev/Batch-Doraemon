<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        width: 100%;
        background-color: lightsteelblue;
      }
      .box {
        height: 200px;
        width: 200px;
        position: absolute;
        /* top: calc(50% - 100px);
        left: calc(50% - 100px); */
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: red;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
  </body>
</html>
