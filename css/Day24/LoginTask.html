<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Task</title>
    <link rel="stylesheet" href="./LoginTask.css" />
    <!-- Basic Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css"
      rel="stylesheet"
    />
    <!-- Filled Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css"
      rel="stylesheet"
    />
    <!-- Brand Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <div class="headIcon">
        <i class="bx bx-user"></i>
      </div>
      <form action="">
        <div class="inputBox">
          <i class="bx bx-user"></i>
          <input type="email" placeholder="Email ID" />
        </div>

        <div class="inputBox">
          <i class="bx bx-lock-keyhole"></i>
          <input type="password" placeholder="Password" />
        </div>

        <div class="rf">
          <div>
            <input type="checkbox" id="rememberMe" />
            <label for="rememberMe">Remember Me</label>
          </div>

          <a href="">Forget Password</a>
        </div>
        <input type="submit" value="Login" />
      </form>
    </main>
  </body>
</html>
