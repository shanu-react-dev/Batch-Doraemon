<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Types</title>
  </head>
  <body>
    <form>
      <label for="username">Enter Username</label>
      <input
        type="text"
        placeholder="Enter Username"
        name="username"
        id="username"
      />

      <br /><br />
      <label for="email">Enter your email: </label>
      <input
        type="email"
        placeholder="example@gmail.com"
        name="email"
        id="email"
      />

      <br /><br />
      <label for="password">Enter Password</label>
      <input
        type="password"
        placeholder="Enter Password"
        name="password"
        id="password"
      />

      <br /><br />
      <label for="dob">Select Date Of Birth</label>
      <!-- <input type="date" name="dob" id="dob" /> -->
      <!-- <input type="datetime" /> -->
      <input type="datetime-local" name="dateandtime" />

      <br /><br />
      <label for="color">Select your favorite color</label>
      <input type="color" name="color" id="color" />

      <br /><br />
      <label for="">Select Gender</label>
      <input type="radio" id="male" name="gender" value="male" />
      <label for="male">Male</label>

      <input type="radio" id="female" name="gender" value="female" />
      <label for="female">Female</label>

      <br /><br />
      <label for="">Skills</label>
      <input type="checkbox" id="java" name="skills" value="java" />
      <label for="java">Java</label>

      <input type="checkbox" id="javaScript" name="skills" value="javascript" />
      <label for="javaScript">JavaScript</label>

      <input type="checkbox" id="html" name="skills" value="html" />
      <label for="html">HTML</label>

      <br /><br />
      <label for="img">Please upload your photo</label>
      <input type="file" name="img" id="img" />

      <br /><br />
      <!-- <input
        type="image"
        src="https://cdn.pixabay.com/photo/2026/01/15/07/58/superb-fairywren-10069195_1280.jpg"
        alt=""
      /> -->

      <label for="month">Select your month</label>
      <input type="month" name="" id="" />

      <br /><br />
      <label for="age">Enter your age</label>
      <input type="number" name="age" id="age" />

      <br /><br />
      <label for="phNo">Enter your Phone Number</label>
      <input
        type="tel"
        placeholder="enter your contact"
        name="phNo"
        id="phNo"
      />

      <br /><br />
      <label for="vol">Set volume</label>
      <input type="range" name="vol" id="vol" />

      <br /><br />
      <label for="time">Select Time</label>
      <input type="time" name="time" id="time" />

      <br /><br />
      <label for="url">ENter your website</label>
      <input type="url" placeholder="Enter URL" id="url" name="url" />

      <br />
      <button>Submit</button>
      <input type="submit" value="submit using input" />
      <input type="button" value="MyDummy Button" />
      <input type="reset" />
    </form>
  </body>
</html>
