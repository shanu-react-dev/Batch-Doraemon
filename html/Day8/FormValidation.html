<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <label for="username">Enter Username:</label>
      <input
        type="text"
        name="username"
        placeholder="Enter Your username"
        maxlength="30"
        minlength="3"
        required
      />

      <br /><br />
      <label for="age">Enter your age</label>
      <input type="number" min="18" max="40" required />

      <br /><br />
      <label for="dob">Select Your DOB</label>
      <input type="date" min="2026-01-01" max="2026-01-31" required />

      <br /><br />
      <label for="img">Select your Image</label>
      <input type="file" accept=".jpg" />

      <br /><br />
      <label for="password">Enter Password</label>
      <input
        type="password"
        name="password"
        id="password"
        pattern="[A-Za-z0-9]{8-16}"
      />

      <br /><br />
      <label for="vol">Select Volume</label>
      <input type="range" name="vol" id="vol" value="0" step="10" />

      <br /><br />
      <label for="aadhaar">Aadhaar</label>
      <input type="text" value="123456789012" readonly />

      <br /><br />
      <label for="gender">Select Gender</label>
      <input type="radio" name="gender" id="male" checked />
      <label for="male">Male</label>
      <input type="radio" name="gender" id="Female" />
      <label for="Female">FeMale</label>
      <input type="radio" name="gender" id="others" />
      <label for="others">Others</label>

      <br /><br />
      <label for="">Select your skills</label>
      <input type="checkbox" name="skills" id="java" />
      <label for="java">Java</label>
      <input type="checkbox" name="skills" id="html" checked />
      <label for="html">HTML</label>
      <input type="checkbox" name="skills" id="css" checked />
      <label for="css">CSS</label>
      <input type="checkbox" name="skills" id="python" />
      <label for="python">Python</label>

      <br />
      <input type="submit" value="Register" />
    </form>
  </body>
</html>
