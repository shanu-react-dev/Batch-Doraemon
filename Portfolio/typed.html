<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.js"
      integrity="sha512-tQQXRDB2wEmuJGtFrmmoFYzNTq8StA1XJrfO0OQbbTxd9G0CwaTDL6/C1y805IlvBVrMwOqob1kf6r/2U5XXVg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </head>
  <body>
    <h1>I'm <br /><span id="career"></span></h1>

    <script>
      var typed2 = new Typed("#career", {
        strings: [
          "A software Developer",
          "Graphic Designer",
          "Java Developer",
          "MERN Developer",
        ],
        typeSpeed: 60,
        backSpeed: 40,
        fadeOut: false,
        loop: true,
      });
    </script>
  </body>
</html>
