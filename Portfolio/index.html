<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <!-- Basic Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css"
      rel="stylesheet"
    />
    <!-- Filled Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css"
      rel="stylesheet"
    />
    <!-- Brand Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />

    <script

      integrity="sha512-tQQXRDB2wEmuJGtFrmmoFYzNTq8StA1XJrfO0OQbbTxd9G0CwaTDL6/C1y805IlvBVrMwOqob1kf6r/2U5XXVg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </head>
  <body>
    <nav>
      <div class="logo">Kumar.</div>
      <div class="listBox">
        <ul>
          <li>
            <a href="#">Home</a>
          </li>
          <li>
            <a href="#">About</a>
          </li>
          <li>
            <a href="#">Projects</a>
          </li>
          <li>
            <a href="#">Contact</a>
          </li>
        </ul>
      </div>
      <div class="btnBox">
        <a href="./Amarjeet Kumar.pdf" download="">
          <button>Download CV <i class="bx bx-save"></i></button>
        </a>
      </div>
    </nav>

    <!-- Homepage starts here -->
    <section id="home">
      <section class="details">
        <span>Kumar Sanu</span>
        <h1>
          I'm <br />
          <span id="career"></span>

        <p>
          Experienced frontend developer with a passion for creating visually
          stunning and user-friendly websites.
        </p>
        <div class="hire">
          <button>Hire Me</button>
          <a href="./Amarjeet Kumar.pdf" download="">
            <button>Download CV <i class="bx bx-save"></i></button>
          </a>
        </div>

        <div class="icons">
          <div><i class="bxl bx-instagram"></i></div>
          <div><i class="bxl bx-linkedin"></i></div>
          <div><i class="bxl bx-dribbble"></i></div>
          <div><i class="bxl bx-github"></i></div>
        </div>
      </section>

      <section class="img">
        <div></div>
      </section>

    <script>
      var typed2 = new Typed("#career", {
        strings: [
          "A Software Developer",
          "A Graphic Designer",
          "UI UX Designer",
          "A MERN Developer",
        ],
        typeSpeed: 100,
        backSpeed: 60,
        fadeOut: false,
        loop: true,
      });
    </script>
  </body>
</html>
